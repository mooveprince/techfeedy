<!DOCTYPE html>
<html ng-app="techfeedapp">
    <head>
        <meta charset="utf-8">
        <title>Tech Feedy</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta http-equiv="refresh" content="300">
        <link href="style.css" rel="stylesheet">
        <link href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css" rel="stylesheet"/>      
        <link rel="stylesheet" href="http://css-spinners.com/css/spinner/spinner.css" type="text/css">        
    </head>
    <body>
        <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
        <script src="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>
        <script src= "https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js"></script>
        <script src="appController.js"></script>
        <nav role="navigation" class="navbar navbar-default">
            <div class="container">
                <div class="navbar-header">
                    <a href="javascript:history.go(0)" class="navbar-brand">Brand</a>
                </div>
            </div>
        </nav>
        <div class="container" ng-controller="techFeedController" ng-init="init()">
            <div class="row clearfix">
                <div class="col-sm-6 column">
                    <div class="block">
                        <h2>
                            <a href="https://news.ycombinator.com/" target="_blank">Hacker News</a>
                        </h2>
                        <ul class="list">
                            <div class="spinLoc" ng-show="hackerSpinner"><div class="spinner"></div></div>
                            <li ng-repeat="news in newsFeed.hackerNews">
                                <a href="{{news.link}}" target="_blank">{{news.title }} </a>
                            </li>                    
                        </ul>
                    </div>
                </div>
                <div class="col-sm-6 column">
                    <div class="block">
                    <h2>
                        <a href="http://www.producthunt.com/" target="_blank">Product Hunt</a>
                    </h2>
                    <ul class="list">
                        <div class="spinLoc" ng-show="productHuntSpinner"><div class="spinner"></div></div>
                        <li ng-repeat="news in newsFeed.productHunt">
                            <a href="{{news.redirect_url}}" target="_blank">{{news.name }} </a> <span> -  {{news.tagline}} </span>
                        </li>                      
                    </ul>
                    </div>
                </div>
            </div>
            <div class="row clearfix">
                <div class="col-sm-6 column">
                    <div class="block">
                        <h2>
                            <a href="http://techcrunch.com/" target="_blank">Tech Crunch</a>
                        </h2>
                        <ul class="list">
                            <div class="spinLoc" ng-show="techcrunchSpinner"><div class="spinner"></div></div>
                            <li ng-repeat="news in newsFeed.techcrunch">
                                <a href="{{news.link}}" target="_blank">{{news.title }}</a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="col-sm-6 column">
                    <div class="block">
                        <h2>
                            <a href="http://www.techmeme.com/" target="_blank">Tech Meme</a>
                        </h2>
                        <ul class="list">
                            <div class="spinLoc" ng-show="techmemeSpinner"><div class="spinner"></div></div>
                            <li ng-repeat="news in newsFeed.techmeme">
                                <a href="{{news.link}}" target="_blank">{{news.title }} </a>
                            </li>
                        </ul>
                    </div>
                </div>                
            </div>
            <footer>
                <div class="row">
                    <div class="col-xs-12 middle">
                        <a href="http://www.twitter.com/mooveprince" target="_blank">Contact</a>
                    </div>                   
                </div>
            </footer>
        </div>
    </body>
</html>
